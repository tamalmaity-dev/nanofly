name: CI

# Runs on every push to main and on every pull request
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ─── Frontend lint + build check  ──────────────────────────────────────────────────────
  frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Build
        working-directory: web
        run: npm run build

  # ─── Backend cross-compile check (all platforms) ──────────────────────────────
  backend:
    name: Backend — ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux/amd64
            goos: linux
            goarch: amd64
          - name: linux/arm64
            goos: linux
            goarch: arm64
          - name: linux/armv7
            goos: linux
            goarch: arm
            goarm: "7"
          - name: darwin/arm64
            goos: darwin
            goarch: arm64
          - name: windows/amd64
            goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          VERSION="$(cat VERSION 2>/dev/null | tr -d '[:space:]' || echo dev)"
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          go build -ldflags="-s -w -X main.Version=${VERSION}" -o /dev/null ./cmd/nanofly
