name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        working-directory: web
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

  build-backend:
    name: Build Backend (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            suffix: linux-amd64
          - goarch: arm64
            suffix: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          go mod tidy
          go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o nanofly ./cmd/nanofly

      - name: Package
        run: |
          mkdir -p release/web
          cp nanofly release/
          cp -r web/dist release/web/dist
          [ -f nanofly.example.yaml ] && cp nanofly.example.yaml release/ || true
          [ -f LICENSE ] && cp LICENSE release/ || true
          [ -f README.md ] && cp README.md release/ || true
          cd release
          tar -czf ../nanofly-${{ matrix.suffix }}.tar.gz .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: nanofly-${{ matrix.suffix }}.tar.gz
          generate_release_notes: true
