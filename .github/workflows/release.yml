name: Release

# Triggered when you push a version tag: git tag v0.3.0-beta && git push origin v0.3.0-beta
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ─── 1. Build the React frontend ──────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
          retention-days: 1

  # ─── 2. Build Go binaries for each target platform ────────────────────────────
  build-backend:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            suffix: linux-amd64
          - name: linux-arm64
            goos: linux
            goarch: arm64
            suffix: linux-arm64
          - name: linux-armv7
            goos: linux
            goarch: arm
            goarm: 7
            suffix: linux-armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

      - name: Tidy modules
        run: go mod tidy

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          VERSION="${{ github.ref_name }}"
          go build \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -trimpath \
            -o nanofly \
            ./cmd/nanofly

      - name: Package release tarball
        run: |
          VERSION="${{ github.ref_name }}"
          OUTDIR="release-${{ matrix.suffix }}"
          mkdir -p "${OUTDIR}/web"

          cp nanofly "${OUTDIR}/"
          cp -r web/dist "${OUTDIR}/web/dist"
          # Write the VERSION file into the tarball so running instances know their version
          echo "${VERSION}" > "${OUTDIR}/VERSION"
          [ -f nanofly.example.yaml ] && cp nanofly.example.yaml "${OUTDIR}/" || true
          [ -f install.sh ]           && cp install.sh           "${OUTDIR}/" || true
          [ -f LICENSE ]              && cp LICENSE               "${OUTDIR}/" || true
          [ -f README.md ]            && cp README.md             "${OUTDIR}/" || true

          tar -czf "nanofly-${{ matrix.suffix }}.tar.gz" -C "${OUTDIR}" .
          echo "Packaged: nanofly-${{ matrix.suffix }}.tar.gz"
          ls -lh "nanofly-${{ matrix.suffix }}.tar.gz"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nanofly-${{ matrix.suffix }}.tar.gz
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
